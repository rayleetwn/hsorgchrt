<style>
/* ── Tooltip 逐步導覽 ── */
#tour-backdrop {
  position: fixed; inset: 0; z-index: 900;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(1px);
  pointer-events: none;
  transition: opacity 0.3s;
}
#tour-backdrop.hide { opacity: 0; }

#tour-tooltip {
  position: fixed; z-index: 910;
  background: #1E1E1E;
  border: 0.5px solid #D4D4D4;
  border-radius: 10px;
  padding: 16px 18px 14px;
  width: 280px;
  box-shadow: 0 0 24px #D4D4D420;
  font-family: var(--font-sans, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif);
  transition: top 0.35s cubic-bezier(0.4,0,0.2,1),
              left 0.35s cubic-bezier(0.4,0,0.2,1),
              opacity 0.25s;
}
#tour-tooltip.hide { opacity: 0; pointer-events: none; }
#tour-tooltip::before {
  content: '';
  position: absolute;
  border: 7px solid transparent;
}
#tour-tooltip.arrow-down::before {
  border-top-color: #D4D4D4;
  top: 100%; left: 28px;
}
#tour-tooltip.arrow-up::before {
  border-bottom-color: #D4D4D4;
  bottom: 100%; left: 28px;
}
#tour-tooltip.arrow-left::before {
  border-right-color: #D4D4D4;
  right: 100%; top: 18px;
}

#tour-step-indicator {
  font-size: 15px; color: #808080;
  letter-spacing: 0.08em; margin-bottom: 6px;
}
#tour-title {
  font-size: 19px; font-weight: 600; color: #D4D4D4;
  margin-bottom: 6px;
}
#tour-desc {
  font-size: 17px; color: #9E9E9E; line-height: 1.6;
  margin-bottom: 14px;
}
#tour-actions {
  display: flex; justify-content: space-between; align-items: center;
}
#tour-skip {
  font-size: 16px; color: #606060; background: none;
  border: none; padding: 4px 0; cursor: pointer;
  font-family: inherit;
}
#tour-skip:hover { color: #909090; background: none; }
#tour-next {
  font-size: 17px; font-weight: 500;
  background: #D4D4D4; border: none;
  color: #1E1E1E; padding: 6px 14px;
  border-radius: 6px; cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
#tour-next:hover { background: #ffffff; }

/* ── 高亮目標框 ── */
.tour-highlight {
  outline: 2px solid #D4D4D4 !important;
  outline-offset: 3px;
  border-radius: 6px;
  position: relative;
  z-index: 901;
  box-shadow: 0 0 16px #D4D4D440;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0f1117; overflow: hidden; }
body {
  font-family: var(--font-sans, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif);
  display: flex; flex-direction: column;
  padding: 12px; gap: 8px;
}
#canvas-wrap { width: 100%; flex: 1; overflow: hidden; position: relative; background: #1E1E1E; border-radius: 12px; border: 0.5px solid #3C3C3C; }
#svg-canvas { width: 100%; height: 100%; cursor: grab; }
#svg-canvas.dragging { cursor: grabbing; }
.node-group { cursor: pointer; }
.node-rect { transition: filter 0.2s; }

/* ── 側邊面板遮罩 ── */
#panel-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(1px);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s ease;
  border-radius: inherit;
}
#panel-overlay.show { opacity: 1; pointer-events: all; }

/* ── 側邊滑入面板 ── */
#detail-panel {
  position: absolute; top: 0; left: 0;
  width: 320px; height: 100%;
  background: #1E1E1E;
  border-right: 0.5px solid #3C3C3C;
  border-radius: var(--border-radius-lg, 12px) 0 0 var(--border-radius-lg, 12px);
  display: flex; flex-direction: column;
  z-index: 101;
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}
#detail-panel.show { transform: translateX(0); }

/* 面板 header */
#dp-header {
  padding: 16px 16px 12px;
  border-bottom: 0.5px solid #2D2D2D;
  flex-shrink: 0;
  position: relative;
}
#dp-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600;
  margin-bottom: 10px;
  flex-shrink: 0;
}
#dp-name  { font-size: 19px; font-weight: 600; color: #D4D4D4; }
#dp-title { font-size: 15px; color: #808080; margin-top: 2px; }
#detail-close {
  position: absolute; top: 12px; right: 12px;
  background: #2D2D2D; border: 0.5px solid #3C3C3C;
  color: #808080; font-size: 17px; cursor: pointer;
  width: 26px; height: 26px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit; padding: 0;
  transition: background 0.15s, color 0.15s;
}
#detail-close:hover { background: #3C3C3C; color: #D4D4D4; }

/* 面板內容捲動區 */
#dp-body {
  flex: 1; overflow-y: auto; padding: 14px 16px 20px;
  scrollbar-width: thin; scrollbar-color: #3C3C3C transparent;
}
#dp-body::-webkit-scrollbar { width: 4px; }
#dp-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── RWD 手機：底部滑入 ── */
@media (max-width: 600px) {
  #detail-panel {
    top: auto; bottom: 0; left: 0; right: 0;
    width: 100%; height: 70%;
    border-right: none; border-top: 0.5px solid var(--border);
    border-radius: var(--border-radius-lg, 12px) var(--border-radius-lg, 12px) 0 0;
    transform: translateY(100%);
  }
  #detail-panel.show { transform: translateY(0); }
}

/* ── 主題變數 ── */
:root {
  --bg-page:    #0f1117;
  --bg-canvas:  #1E1E1E;
  --bg-btn:     #252526;
  --bg-btn-hov: #2D2D2D;

  --text:       #D4D4D4;

  --panel-bg:   #1E1E1E;
  --panel-border: #3C3C3C;
  --row-border: #2A2A2A;
}
body.light {

  --bg-canvas:  #FFFFFF;
  --bg-btn:     #E8E8E8;
  --bg-btn-hov: #D8D8D8;
  --border:     #C8C8C8;
  --text:       #1E1E1E;
  --text-dim:   #666666;
  --panel-bg:   #FAFAFA;
  --panel-border: #D0D0D0;
  --row-border: #E8E8E8;
}

#toolbar { display: flex; gap: 8px; margin-bottom: 0; flex-wrap: wrap; align-items: center; }
button { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--bg-btn); color: var(--text); cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s; }
button:hover { background: var(--bg-btn-hov); color: var(--text); }
#zoom-info { font-size: 12px; color: var(--text-dim); padding: 5px 4px; align-self: center; font-family: inherit; }
#internal-notice {
  color: #e8a040; font-weight: 600; font-size: 12px; letter-spacing: 0.08em;

  cursor: default; transition: all 0.3s ease; margin-left: 6px;

#internal-notice:hover {

#btn-theme { font-size: 14px; padding: 4px 10px; }
html, body { background: var(--bg-page); }
#canvas-wrap { background: var(--bg-canvas); border-color: var(--border); }
#detail-panel { background: var(--panel-bg); border-color: var(--panel-border); }
#dp-header { border-color: var(--panel-border); }
#dp-name { color: var(--text); }
#dp-title { color: var(--text-dim); }
