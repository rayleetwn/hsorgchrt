<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航昇關係企業組織圖 - 精簡版</title>
<style>
  :root {
    --accent-blue: #3b6fba;
    --bg-dark: #0f1117;
    /* 全局字體基礎大小 */
    --base-font-size: 34px; 
    --title-font-size: 26px; /* 微調職稱字體 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-dark);
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    color: #e2e4f0;
    touch-action: none;
  }

  /* 工具列 */
  .toolbar {
    position: fixed; top: 15px; left: 15px;
    z-index: 9999;
    display: flex; gap: 10px; align-items: center;
    background: rgba(26, 29, 39, 0.9);
    padding: 10px 20px;
    border-radius: 50px;
    border: 1px solid #2e3347;
    backdrop-filter: blur(10px);
  }
  .search-input {
    background: #0f1117; border: 2px solid #3b6fba; color: white;
    padding: 8px 15px; border-radius: 25px; font-size: 18px; width: 180px;
  }
  .btn {
    background: #2e3347; color: #c8cad4; border: none;
    padding: 8px 15px; border-radius: 25px; cursor: pointer; font-size: 16px;
  }

  /* 抓取容器 */
  #viewport {
    width: 100vw; height: 100vh;
    cursor: grab;
    overflow: hidden;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #viewport:active { cursor: grabbing; }

  #canvas {
    transform-origin: center center;
    position: absolute;
    will-change: transform;
    padding: 1000px; /* 供拖拽空間 */
    display: flex; flex-direction: column; align-items: center;
  }

  .company-title { text-align: center; margin-bottom: 60px; pointer-events: none; }
  .company-title h1 { font-size: 48px; color: #e2e4f0; }
  .company-title p { font-size: 26px; color: #565869; margin-top: 10px; }

  /* ── 節點樣式優化 (Bubble Size) ── */
  .card {
    border-radius: 10px; border: 2px solid;
    /* 大幅縮減 Padding 讓 Bubble 變小 */
    padding: 8px 16px; 
    text-align: center;
    cursor: pointer; white-space: nowrap;
    background: #1a1d27; 
    min-width: 140px; /* 縮减最小寬度 */
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 0 15px rgba(59, 111, 186, 0.4); }
  
  .card-name  { font-size: var(--base-font-size); font-weight: 600; line-height: 1.1; }
  .card-title { font-size: var(--title-font-size); margin-top: 4px; opacity: 0.8; }

  /* 顏色設定 */
  .c-top { border-color:#3b6fba; }
  .c-dept { border-color:#5ec9a8; }
  .c-staff { border-color:#6d5dfc; }
  .c-mem { border-color:#4a5064; background: #11131a; }

  /* 排序與間距 */
  .h-row { display: flex; justify-content: center; position: relative; gap: 40px; }
  .node-col[data-staff="true"] { order: 99; }

  /* 連線間距優化 */
  .v-line { width: 2px; height: 30px; /* 縮短垂直連線 */ background: #343a4e; align-self: center; }
  .h-row::before {
    content: ''; position: absolute; top: 0; height: 2px; background: #343a4e;
    left: var(--hl); width: var(--hw);
  }

  .children-wrap { overflow: hidden; transition: max-height 0.4s; }
  .children-wrap.collapsed { max-height: 0; opacity: 0; }

  /* 資訊面板 */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9000; display:none; }
  .overlay.show { display: block; }
  .info-panel {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #1a1d27; border: 2px solid #3b6fba; border-radius: 20px;
    padding: 30px; z-index: 9001; width: 400px; display: none;
  }
  .info-panel.show { display: block; }
</style>
</head>
<body>

<div class="toolbar">
  <input type="text" class="search-input" id="searchInput" placeholder="搜尋姓名..." onkeyup="handleSearch(event)">
  <button class="btn" onclick="resetView()">重置視角</button>
  <button class="btn" onclick="expandAll()">全部展開</button>
</div>

<div id="viewport">
  <div id="canvas">
    <div class="company-title">
      <h1>航昇關係企業組織圖</h1>
      <p>2026 年 3 月</p>
    </div>
    <div class="tree-wrap" id="tree"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="info-panel" id="panel">
  <h2 id="pname" style="font-size:40px; color:#fff;"></h2>
  <p id="ptitle" style="font-size:28px; color:#3b6fba; margin-top:8px;"></p>
  <button class="btn" style="margin-top:20px; width:100%;" onclick="closePanel()">關閉</button>
</div>

<script>
// 此處 DATA 沿用
const DATA = [
  { id:'board', name:'董事會', color:'c-top', noPanel:true, children:[
    { id:'chairman', name:'魏程師', title:'董事長', color:'c-top', children:[
      { id:'staff-room', name:'董事長室', color:'c-staff', isStaff:true, children:[
        { id:'asst', name:'祝彩蘋', title:'董事長特助', color:'c-mem' },
        { id:'sec',  name:'孔振蕊', title:'董事長秘書', color:'c-mem' },
      ]},
      { id:'gm', name:'謝淑瑤', title:'總經理', color:'c-top', children:[
        { id:'mgmt', name:'管理部', color:'c-staff', isStaff:true, children:[
          { id:'comp1', name:'孔振蕊', title:'合規', color:'c-mem' },
          { id:'comp2', name:'李一中', title:'合規', color:'c-mem' },
          { id:'it',    name:'謝佩芬', title:'資訊組副理', color:'c-mem' },
          { id:'ga',    name:'魏嘉俊', title:'總務／人事行政', color:'c-mem' },
        ]},
        { id:'shipping', name:'船務代理處', color:'c-dept', children:[
          { id:'agency', name:'總代理部', color:'c-dept', children:[
            { id:'op-vp', name:'孔振蕊', title:'船務操作副總', color:'c-top', children:[
               { id:'op-m1', name:'林虹君', title:'船務操作協理', color:'c-mem' }
            ]}
          ]}
        ]}
      ]}
    ]}
  ]}
];

const state = { 
    scale: 0.5, /* 初始化縮放調大一點點 */
    x: 0, 
    y: 0, 
    isDragging: false, 
    lastMouseX: 0, 
    lastMouseY: 0 
};

function buildNode(node, container) {
  const col = document.createElement('div');
  col.className = 'node-col';
  if (node.isStaff) col.dataset.staff = "true";

  const card = document.createElement('div');
  card.className = `card ${node.color}`;
  card.id = `card-${node.id}`;
  const hasKids = node.children && node.children.length > 0;

  card.innerHTML = `
    <div class="card-name">${node.name}</div>
    ${node.title ? `<div class="card-title">${node.title}</div>` : ''}
  `;

  card.onclick = (e) => {
    e.stopPropagation();
    if (hasKids) toggleNode(node.id);
    if (!node.noPanel) showPanel(node);
  };

  col.appendChild(card);
  if (hasKids) {
    col.appendChild(Object.assign(document.createElement('div'), {className:'v-line'}));
    const wrap = document.createElement('div');
    wrap.className = 'children-wrap';
    wrap.dataset.for = node.id;
    const row = document.createElement('div');
    row.className = 'h-row';
    node.children.forEach(c => buildNode(c, row));
    wrap.appendChild(row);
    col.appendChild(wrap);
  }
  container.appendChild(col);
}

// 核心拖拽與縮放
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');

viewport.onmousedown = e => {
  if (e.target.closest('.toolbar') || e.target.closest('.info-panel')) return;
  state.isDragging = true;
  state.lastMouseX = e.clientX;
  state.lastMouseY = e.clientY;
};

window.onmousemove = e => {
  if (!state.isDragging) return;
  const dx = e.clientX - state.lastMouseX;
  const dy = e.clientY - state.lastMouseY;
  state.x += dx;
  state.y += dy;
  state.lastMouseX = e.clientX;
  state.lastMouseY = e.clientY;
  updateTransform();
};

window.onmouseup = () => state.isDragging = false;

viewport.onwheel = e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  state.scale *= factor;
  updateTransform();
};

function updateTransform() {
  canvas.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
  updateLines();
}

function updateLines() {
  document.querySelectorAll('.h-row').forEach(row => {
    const cols = Array.from(row.
